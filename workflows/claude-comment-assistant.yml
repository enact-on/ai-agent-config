name: Claude Comment Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: claude-comment-${{ github.event.repository.full_name }}-${{ github.event_name }}-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  claude-from-comment:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_CONFIG_DIR: ${{ github.workspace }}/.claude-agents
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure agent references exist
        run: |
          test -d .claude-agents/agents

      - name: Build prompt from installed agent markdown
        id: build_prompt
        shell: bash
        env:
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          prompt_file="$(mktemp)"
          {
            echo "You are the repository automation assistant."
            echo
            echo "Use the following installed reference agents as your operating guidance."
            echo
            for file in \
              .claude-agents/agents/common/team-lead-orchestrator.md \
              .claude-agents/agents/common/code-reviewer.md \
              .claude-agents/agents/common/code-implementer.md \
              .claude-agents/agents/common/security-auditor.md; do
              if [[ -f "$file" ]]; then
                echo "--- FILE: $file ---"
                cat "$file"
                echo
              fi
            done

            if [[ -f .claude-agents/config/stacks.txt ]]; then
              while IFS= read -r stack; do
                case "$stack" in
                  laravel)
                    for file in .claude-agents/agents/laravel/*.md; do
                      [[ -f "$file" ]] || continue
                      echo "--- FILE: $file ---"
                      cat "$file"
                      echo
                    done
                    ;;
                  nextjs)
                    for file in .claude-agents/agents/nextjs/*.md; do
                      [[ -f "$file" ]] || continue
                      echo "--- FILE: $file ---"
                      cat "$file"
                      echo
                    done
                    ;;
                  reactnative|expo)
                    for file in .claude-agents/agents/mobile/*.md; do
                      [[ -f "$file" ]] || continue
                      echo "--- FILE: $file ---"
                      cat "$file"
                      echo
                    done
                    ;;
                esac
              done < .claude-agents/config/stacks.txt
            fi

            echo "Current request:"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Comment author: ${COMMENT_AUTHOR}"
            echo "- Comment body:"
            printf '%s\n' "${COMMENT_BODY}"
            echo
            echo "If the comment asks for review, act as a reviewer first."
            echo "If the comment asks for implementation, make the smallest safe change and explain what changed."
            echo "If the request is unclear, ask a short clarifying question in the GitHub thread."
          } > "$prompt_file"

          {
            echo "prompt<<EOF"
            cat "$prompt_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.build_prompt.outputs.prompt }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 10
